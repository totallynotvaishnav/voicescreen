databases:
  - name: voicescreen-db
    plan: free
    databaseName: voicescreen
    user: voicescreen

services:
  # ── Backend (FastAPI) ──────────────────────────
  - type: web
    name: voicescreen-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voicescreen-db
          property: connectionString
      - key: BOLNA_API_KEY
        sync: false
      - key: BOLNA_AGENT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: arcee-ai/trinity-large-preview:free
      - key: PYTHON_VERSION
        value: 3.11.6

  # ── Frontend (React Static Site) ───────────────
  - type: web
    name: voicescreen-app
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Proxy API calls to the backend service
      - type: rewrite
        source: /api/*
        destination: https://voicescreen-api.onrender.com/api/*
      # SPA fallback — all other routes → index.html
      - type: rewrite
        source: /*
        destination: /index.html
